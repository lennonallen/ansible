"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory$git_branch$git_status$nodejs$python$rust$package$line_break$character"""

add_newline = true
continuation_prompt = '❯ '

[character]
success_symbol = '[❯❯❯](bold #83a598)'
error_symbol = '[❯❯❯](bold #fb4934)'

[directory]
style = 'bold #83a598'
truncation_length = 0

[git_branch]
symbol = ' '
style = 'bold #b8bb26'

[git_status]
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'
style = 'bold #fabd2f'

[nodejs]
symbol = '⬢ '
style = '#b8bb26'

[python]
symbol = '🐍 '
style = '#fabd2f'

[rust]
symbol = '🦀 '
style = '#fb4934'

[package]
symbol = '📦 '
style = '#d3869b'

[cmd_duration]
min_time = 2000
style = '#a89984'

[time]
disabled = true

[username]
style_user = '#d5c4a1'
style_root = '#fb4934'
show_always = false

[hostname]
ssh_only = false
style = '#8ec07c'
