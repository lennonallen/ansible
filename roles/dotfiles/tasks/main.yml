- name: Deploy .bashrc
  ansible.builtin.copy:
    src: bashrc
    dest: "{{ user_home }}/.bashrc"
    mode: '0644'
    
- name: Deploy .bashrc.d
  ansible.builtin.copy:
    src: bashrc.d
    dest: "{{ user_home }}/.bashrc.d/"
    mode: '0644'

- name: Deploy bash_profile
  ansible.builtin.copy:
    src: bash_profile
    dest: "{{ user_home }}/.bash_profile"
    mode: '0644'

- name: Create .config directory
  ansible.builtin.file:
    path: "{{ user_home }}/.config"
    state: directory
    mode: '0755'

- name: Deploy starship config
  ansible.builtin.copy:
    src: starship.toml
    dest: "{{ user_home }}/.config/starship.toml"
    mode: '0644'

- name: Deploy git config
  ansible.builtin.template:
    src: gitconfig.j2
    dest: "{{ user_home }}/.gitconfig"
    mode: '0644'

- name: Deploy tmux config
  ansible.builtin.copy:
    src: tmux.conf
    dest: "{{ user_home }}/.tmux.conf"
    mode: '0644'

- name: Deploy rofi config
  ansible.builtin.copy:
    src: rofi/
    dest: "{{ user_home }}/.config/rofi/"
    mode: '0644'

- name: Deploy micro config
  ansible.builtin.copy:
    src: micro/
    dest: "{{ user_home }}/.config/micro/"
    mode: '0644'
