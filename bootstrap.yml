---
- hosts: localhost
  connection: local
  become: true

  tasks:
    - name: Create ansible user
      ansible.builtin.user:
        name: ansible
        groups: root

    - name: Add SSH key for ansible user
      ansible.builtin.authorized_key:
        user: ansible
        key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIO+0gWbzoS+0btCNw1gVBPCLuyG2zXTjjS00+9wvlDU1 ansible"
        state: present

    - name: Add sudoers file for ansible user
      ansible.builtin.copy:
        src: roles/bootstrap/files/sudoer_ansible
        dest: /etc/sudoers.d/ansible
        owner: root
        group: root
        mode: '0440'

    - name: Set up ansible-pull cron job
      ansible.builtin.cron:
        name: ansible-pull
        user: ansible
        minute: "*/10"
        job: "/usr/bin/ansible-pull -o -U https://github.com/lennonallen/ansible.git playbook.yml"
